<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>股票投资决策辅助系统</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/font-awesome@4.7.0/css/font-awesome.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <style>
        body {
            background-color: #f8f9fa;
            font-family: 'Microsoft YaHei', sans-serif;
        }
        .hero-section {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 60px 0;
            margin-bottom: 30px;
        }
        .card {
            border-radius: 10px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            transition: transform 0.3s ease;
        }
        .card:hover {
            transform: translateY(-5px);
        }
        .card-header {
            background-color: #f8f9fa;
            border-bottom: 1px solid #e9ecef;
        }
        .btn-primary {
            background-color: #667eea;
            border-color: #667eea;
        }
        .btn-primary:hover {
            background-color: #5a6fd8;
            border-color: #5a6fd8;
        }
        .loading {
            display: none;
            text-align: center;
            padding: 20px;
        }
        .spinner {
            border: 4px solid rgba(0, 0, 0, 0.1);
            border-radius: 50%;
            border-top: 4px solid #667eea;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 0 auto;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        .alert {
            margin-top: 20px;
        }
        .stock-card {
            margin-bottom: 15px;
        }
        .stock-up {
            color: #28a745;
        }
        .stock-down {
            color: #dc3545;
        }
        .portfolio-chart {
            height: 300px;
        }
    </style>
</head>
<body>
    <!-- 头部英雄区 -->
    <div class="hero-section">
        <div class="container">
            <div class="row">
                <div class="col-md-12 text-center">
                    <h1 class="display-4">股票投资决策辅助系统</h1>
                    <p class="lead">基于DIKW框架的智能投资分析工具</p>
                </div>
            </div>
        </div>
    </div>

    <!-- 主内容区 -->
    <div class="container">
        <!-- 配置表单 -->
        <div class="card mb-5">
            <div class="card-header">
                <h2 class="h4">投资参数配置</h2>
            </div>
            <div class="card-body">
                <form id="config-form">
                    <div class="row">
                        <div class="col-md-6">
                            <div class="mb-3">
                                <label for="risk-profile" class="form-label">风险偏好</label>
                                <select class="form-select" id="risk-profile" name="risk_profile">
                                    <option value="激进型">激进型</option>
                                    <option value="稳健型" selected>稳健型</option>
                                    <option value="保守型">保守型</option>
                                </select>
                            </div>
                        </div>
                        <div class="col-md-6">
                            <div class="mb-3">
                                <label for="investment-amount" class="form-label">投资金额 (元)</label>
                                <input type="number" class="form-control" id="investment-amount" name="investment_amount" value="100000" min="10000" step="10000">
                            </div>
                        </div>
                    </div>
                    <div class="d-flex justify-content-end">
                        <button type="button" id="config-btn" class="btn btn-primary">
                            <i class="fa fa-cog mr-2"></i>配置
                        </button>
                    </div>
                </form>
            </div>
        </div>

        <!-- 操作按钮 -->
        <div class="d-flex justify-content-between mb-5">
            <button type="button" id="analyze-btn" class="btn btn-primary" disabled>
                <i class="fa fa-line-chart mr-2"></i>执行分析
            </button>
            <button type="button" id="generate-reports-btn" class="btn btn-success" disabled>
                <i class="fa fa-file-text mr-2"></i>生成报告
            </button>
        </div>

        <!-- 加载动画 -->
        <div class="loading" id="loading">
            <div class="spinner"></div>
            <p class="mt-3">正在处理，请稍候...</p>
        </div>

        <!-- 提示信息 -->
        <div id="alert-container"></div>

        <!-- 分析结果 -->
        <div id="analysis-results" style="display: none;">
            <!-- 市场概况 -->
            <div class="card mb-5">
                <div class="card-header">
                    <h2 class="h4">市场概况</h2>
                </div>
                <div class="card-body">
                    <div class="row">
                        <div class="col-md-3">
                            <div class="card bg-light">
                                <div class="card-body text-center">
                                    <h5 class="card-title">市场趋势</h5>
                                    <p class="card-text" id="market-trend">--</p>
                                </div>
                            </div>
                        </div>
                        <div class="col-md-3">
                            <div class="card bg-light">
                                <div class="card-body text-center">
                                    <h5 class="card-title">涨跌比例</h5>
                                    <p class="card-text" id="rise-fall-ratio">--</p>
                                </div>
                            </div>
                        </div>
                        <div class="col-md-3">
                            <div class="card bg-light">
                                <div class="card-body text-center">
                                    <h5 class="card-title">平均涨跌</h5>
                                    <p class="card-text" id="average-change">--</p>
                                </div>
                            </div>
                        </div>
                        <div class="col-md-3">
                            <div class="card bg-light">
                                <div class="card-body text-center">
                                    <h5 class="card-title">风险预警</h5>
                                    <p class="card-text" id="risk-alerts">--</p>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <!-- 板块表现 -->
            <div class="card mb-5">
                <div class="card-header">
                    <h2 class="h4">板块表现</h2>
                </div>
                <div class="card-body">
                    <div class="row" id="sector-performance">
                        <!-- 板块表现将通过JavaScript动态添加 -->
                    </div>
                </div>
            </div>

            <!-- 股票数据 -->
            <div class="card mb-5">
                <div class="card-header">
                    <h2 class="h4">股票数据</h2>
                </div>
                <div class="card-body">
                    <div class="row" id="stock-data">
                        <!-- 股票数据将通过JavaScript动态添加 -->
                    </div>
                </div>
            </div>

            <!-- 投资组合 -->
            <div class="card mb-5">
                <div class="card-header">
                    <h2 class="h4">投资组合</h2>
                </div>
                <div class="card-body">
                    <div class="row">
                        <div class="col-md-6">
                            <canvas id="portfolio-chart" class="portfolio-chart"></canvas>
                        </div>
                        <div class="col-md-6">
                            <div class="card bg-light">
                                <div class="card-body">
                                    <h5 class="card-title">组合指标</h5>
                                    <ul class="list-group list-group-flush">
                                        <li class="list-group-item">
                                            <span class="fw-bold">总投资:</span> <span id="total-investment">--</span>
                                        </li>
                                        <li class="list-group-item">
                                            <span class="fw-bold">配置股票:</span> <span id="allocated-stocks">--</span>只
                                        </li>
                                        <li class="list-group-item">
                                            <span class="fw-bold">夏普比率:</span> <span id="sharpe-ratio">--</span>
                                        </li>
                                        <li class="list-group-item">
                                            <span class="fw-bold">预期收益:</span> <span id="expected-return">--</span>%
                                        </li>
                                        <li class="list-group-item">
                                            <span class="fw-bold">风险等级:</span> <span id="risk-level">--</span>
                                        </li>
                                    </ul>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <!-- 择时建议 -->
            <div class="card mb-5">
                <div class="card-header">
                    <h2 class="h4">择时建议</h2>
                </div>
                <div class="card-body">
                    <div class="row">
                        <div class="col-md-4">
                            <div class="card bg-light">
                                <div class="card-body text-center">
                                    <h5 class="card-title">信号</h5>
                                    <p class="card-text" id="timing-signal">--</p>
                                </div>
                            </div>
                        </div>
                        <div class="col-md-4">
                            <div class="card bg-light">
                                <div class="card-body text-center">
                                    <h5 class="card-title">建议操作</h5>
                                    <p class="card-text" id="timing-action">--</p>
                                </div>
                            </div>
                        </div>
                        <div class="col-md-4">
                            <div class="card bg-light">
                                <div class="card-body text-center">
                                    <h5 class="card-title">置信度</h5>
                                    <p class="card-text" id="timing-confidence">--</p>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <!-- 立即行动建议 -->
            <div class="card mb-5">
                <div class="card-header">
                    <h2 class="h4">立即行动建议</h2>
                </div>
                <div class="card-body">
                    <ul class="list-group" id="immediate-actions">
                        <!-- 行动建议将通过JavaScript动态添加 -->
                    </ul>
                </div>
            </div>

            <!-- 报告下载 -->
            <div class="card mb-5">
                <div class="card-header">
                    <h2 class="h4">报告下载</h2>
                </div>
                <div class="card-body">
                    <div class="row" id="report-files">
                        <!-- 报告文件将通过JavaScript动态添加 -->
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- 页脚 -->
    <footer class="bg-light text-center py-4 mt-5">
        <div class="container">
            <p class="mb-0">© 2026 股票投资决策辅助系统 | 基于DIKW框架</p>
        </div>
    </footer>

    <!-- 脚本 -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        // 全局变量
        let portfolioChart = null;

        // 初始化页面
        document.addEventListener('DOMContentLoaded', function() {
            // 配置按钮点击事件
            document.getElementById('config-btn').addEventListener('click', function() {
                configInvestment();
            });

            // 分析按钮点击事件
            document.getElementById('analyze-btn').addEventListener('click', function() {
                analyzeInvestment();
            });

            // 生成报告按钮点击事件
            document.getElementById('generate-reports-btn').addEventListener('click', function() {
                generateReports();
            });
        });

        // 配置投资参数
        function configInvestment() {
            const riskProfile = document.getElementById('risk-profile').value;
            const investmentAmount = document.getElementById('investment-amount').value;

            // 显示加载动画
            showLoading();

            // 发送配置请求
            fetch('/api/config', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({
                    risk_profile: riskProfile,
                    investment_amount: investmentAmount
                })
            })
            .then(response => response.json())
            .then(data => {
                hideLoading();
                if (data.status === 'success') {
                    showAlert('success', data.message);
                    // 启用分析按钮
                    document.getElementById('analyze-btn').disabled = false;
                } else {
                    showAlert('danger', data.message);
                }
            })
            .catch(error => {
                hideLoading();
                showAlert('danger', '配置失败：' + error.message);
            });
        }

        // 执行分析
        function analyzeInvestment() {
            // 显示加载动画
            showLoading();

            // 发送分析请求
            fetch('/api/analyze', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({})
            })
            .then(response => response.json())
            .then(data => {
                hideLoading();
                if (data.status === 'success') {
                    showAnalysisResults(data.data);
                    // 启用生成报告按钮
                    document.getElementById('generate-reports-btn').disabled = false;
                } else {
                    showAlert('danger', data.message);
                }
            })
            .catch(error => {
                hideLoading();
                showAlert('danger', '分析失败：' + error.message);
            });
        }

        // 生成报告
        function generateReports() {
            // 显示加载动画
            showLoading();

            // 发送生成报告请求
            fetch('/api/generate_reports', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({})
            })
            .then(response => response.json())
            .then(data => {
                hideLoading();
                if (data.status === 'success') {
                    showAlert('success', data.message);
                    showReportFiles(data.files);
                } else {
                    showAlert('danger', data.message);
                }
            })
            .catch(error => {
                hideLoading();
                showAlert('danger', '报告生成失败：' + error.message);
            });
        }

        // 显示分析结果
        function showAnalysisResults(data) {
            // 显示结果区域
            document.getElementById('analysis-results').style.display = 'block';

            // 填充市场概况
            document.getElementById('market-trend').textContent = data.market_overview.market_trend;
            document.getElementById('rise-fall-ratio').textContent = `${data.market_overview.rising_count}涨/${data.market_overview.falling_count}跌`;
            document.getElementById('average-change').textContent = `${data.market_overview.average_change.toFixed(2)}%`;
            document.getElementById('risk-alerts').textContent = `${data.risk_analysis.risk_alerts}项`;

            // 填充板块表现
            const sectorContainer = document.getElementById('sector-performance');
            sectorContainer.innerHTML = '';
            data.top_sectors.forEach((sector, index) => {
                const sectorCard = document.createElement('div');
                sectorCard.className = 'col-md-4';
                sectorCard.innerHTML = `
                    <div class="card bg-light">
                        <div class="card-body">
                            <h5 class="card-title">${index + 1}. ${sector.sector}</h5>
                            <p class="card-text ${sector.avg_change >= 0 ? 'stock-up' : 'stock-down'}">
                                ${sector.avg_change >= 0 ? '+' : ''}${sector.avg_change.toFixed(2)}%
                            </p>
                            <p class="card-text text-muted">${sector.strength}</p>
                        </div>
                    </div>
                `;
                sectorContainer.appendChild(sectorCard);
            });

            // 获取并填充股票数据
            fetch('/api/stock_data')
                .then(response => response.json())
                .then(stockData => {
                    if (stockData.status === 'success') {
                        const stockContainer = document.getElementById('stock-data');
                        stockContainer.innerHTML = '';
                        
                        Object.entries(stockData.data).forEach(([name, stock]) => {
                            const stockCard = document.createElement('div');
                            stockCard.className = 'col-md-4 stock-card';
                            stockCard.innerHTML = `
                                <div class="card">
                                    <div class="card-body">
                                        <h5 class="card-title">${name}</h5>
                                        <p class="card-text">
                                            <span class="fw-bold">当前价格:</span> ¥${stock.current_price.toFixed(2)}<br>
                                            <span class="fw-bold">涨跌幅:</span> <span class="${stock.change_percent >= 0 ? 'stock-up' : 'stock-down'}">
                                                ${stock.change_percent >= 0 ? '+' : ''}${stock.change_percent.toFixed(2)}%
                                            </span><br>
                                            <span class="fw-bold">板块:</span> ${stock.sector}<br>
                                            <span class="fw-bold">风险等级:</span> ${stock.risk_level}
                                        </p>
                                    </div>
                                </div>
                            `;
                            stockContainer.appendChild(stockCard);
                        });
                    }
                });

            // 填充投资组合信息
            document.getElementById('total-investment').textContent = `¥${data.portfolio_summary.total_investment.toLocaleString()}`;
            document.getElementById('allocated-stocks').textContent = data.portfolio_summary.allocated_stocks;
            document.getElementById('sharpe-ratio').textContent = data.portfolio_summary.sharpe_ratio.toFixed(3);
            document.getElementById('expected-return').textContent = data.portfolio_summary.expected_return.toFixed(2);
            document.getElementById('risk-level').textContent = data.risk_analysis.risk_level;

            // 填充择时建议
            document.getElementById('timing-signal').textContent = data.timing_recommendation.signal;
            document.getElementById('timing-action').textContent = data.timing_recommendation.action;
            document.getElementById('timing-confidence').textContent = data.timing_recommendation.confidence;

            // 填充立即行动建议
            const actionsContainer = document.getElementById('immediate-actions');
            actionsContainer.innerHTML = '';
            data.immediate_actions.forEach((action, index) => {
                const actionItem = document.createElement('li');
                actionItem.className = 'list-group-item';
                actionItem.textContent = `${index + 1}. ${action}`;
                actionsContainer.appendChild(actionItem);
            });

            // 绘制投资组合饼图
            drawPortfolioChart();
        }

        // 绘制投资组合饼图
        function drawPortfolioChart() {
            fetch('/api/stock_data')
                .then(response => response.json())
                .then(stockData => {
                    if (stockData.status === 'success') {
                        // 准备数据
                        const labels = [];
                        const data = [];
                        const backgroundColors = [
                            '#FF6384', '#36A2EB', '#FFCE56', '#4BC0C0',
                            '#9966FF', '#FF9F40', '#C9CBCF', '#7BC225'
                        ];

                        Object.entries(stockData.data).forEach(([name, stock]) => {
                            labels.push(name);
                            data.push(1); // 简化处理，实际应该使用投资组合权重
                        });

                        // 销毁旧图表
                        if (portfolioChart) {
                            portfolioChart.destroy();
                        }

                        // 创建新图表
                        const ctx = document.getElementById('portfolio-chart').getContext('2d');
                        portfolioChart = new Chart(ctx, {
                            type: 'pie',
                            data: {
                                labels: labels,
                                datasets: [{
                                    data: data,
                                    backgroundColor: backgroundColors,
                                    borderColor: backgroundColors,
                                    borderWidth: 1
                                }]
                            },
                            options: {
                                responsive: true,
                                maintainAspectRatio: false,
                                plugins: {
                                    legend: {
                                        position: 'right'
                                    }
                                }
                            }
                        });
                    }
                });
        }

        // 显示报告文件
        function showReportFiles(files) {
            const reportContainer = document.getElementById('report-files');
            reportContainer.innerHTML = '';

            files.forEach(file => {
                const fileCard = document.createElement('div');
                fileCard.className = 'col-md-3 mb-3';
                fileCard.innerHTML = `
                    <div class="card">
                        <div class="card-body">
                            <h5 class="card-title">${file}</h5>
                            <a href="/api/download_report/${file}" class="btn btn-primary btn-sm">
                                <i class="fa fa-download mr-1"></i>下载
                            </a>
                        </div>
                    </div>
                `;
                reportContainer.appendChild(fileCard);
            });
        }

        // 显示加载动画
        function showLoading() {
            document.getElementById('loading').style.display = 'block';
        }

        // 隐藏加载动画
        function hideLoading() {
            document.getElementById('loading').style.display = 'none';
        }

        // 显示提示信息
        function showAlert(type, message) {
            const alertContainer = document.getElementById('alert-container');
            alertContainer.innerHTML = `
                <div class="alert alert-${type} alert-dismissible fade show" role="alert">
                    ${message}
                    <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
                </div>
            `;

            // 3秒后自动关闭
            setTimeout(() => {
                const alert = alertContainer.querySelector('.alert');
                if (alert) {
                    const bsAlert = new bootstrap.Alert(alert);
                    bsAlert.close();
                }
            }, 3000);
        }
    </script>
</body>
</html>
